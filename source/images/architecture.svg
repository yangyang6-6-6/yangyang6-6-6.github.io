<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="viewGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fe"/>
      <stop offset="100%" style="stop-color:#d2e3fc"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef7e0"/>
      <stop offset="100%" style="stop-color:#fce8b2"/>
    </linearGradient>
    <linearGradient id="utilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce8e6"/>
      <stop offset="100%" style="stop-color:#f8d7da"/>
    </linearGradient>
    <linearGradient id="daoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f4ea"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8fd"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eceff1"/>
      <stop offset="100%" style="stop-color:#cfd8dc"/>
    </linearGradient>
    <linearGradient id="myBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLayer" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9e9e9e"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#90a4ae"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="680" fill="#f8f9fa" rx="12"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="800" height="52" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="30" width="800" height="22" fill="url(#headerGrad)"/>
  <text x="400" y="33" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">系统架构图 — 基于有状态的课堂点名系统</text>

  <!-- ==================== View 层 ==================== -->
  <rect x="30" y="68" width="740" height="122" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="68" width="50" height="122" fill="url(#viewGrad)" rx="10"/>
  <rect x="60" y="68" width="20" height="122" fill="url(#viewGrad)"/>
  <text x="55" y="135" text-anchor="middle" fill="#1a56db" font-size="14" font-weight="bold" transform="rotate(-90,55,135)">View</text>

  <text x="100" y="94" fill="#1a56db" font-size="14" font-weight="bold">界面层</text>

  <!-- 三个面板 -->
  <rect x="100" y="105" width="200" height="36" rx="6" fill="#e8f0fe" stroke="#90caf9" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">StudentPanel 学生管理</text>

  <rect x="320" y="105" width="200" height="36" rx="6" fill="#e8f0fe" stroke="#90caf9" stroke-width="1.5"/>
  <text x="420" y="128" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">RollCallPanel 课堂点名</text>

  <rect x="540" y="105" width="200" height="36" rx="6" fill="#e8f0fe" stroke="#90caf9" stroke-width="1.5"/>
  <rect x="540" y="105" width="6" height="36" rx="3" fill="#ff6b6b"/>
  <text x="640" y="128" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">StatisticsPanel 数据统计</text>

  <!-- 横线到 MainFrame -->
  <line x1="200" y1="141" x2="200" y2="152" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="420" y1="141" x2="420" y2="152" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="640" y1="141" x2="640" y2="152" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="200" y1="152" x2="640" y2="152" stroke="#90a4ae" stroke-width="1.5"/>

  <rect x="280" y="152" width="240" height="26" rx="13" fill="#e8f0fe" stroke="#90caf9" stroke-width="1.5"/>
  <text x="400" y="170" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">MainFrame (JTabbedPane 主窗口)</text>

  <!-- 箭头 -->
  <line x1="400" y1="178" x2="400" y2="202" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== Service 层 ==================== -->
  <rect x="30" y="208" width="740" height="105" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="208" width="50" height="105" fill="url(#serviceGrad)" rx="10"/>
  <rect x="60" y="208" width="20" height="105" fill="url(#serviceGrad)"/>
  <text x="55" y="265" text-anchor="middle" fill="#5f3e00" font-size="14" font-weight="bold" transform="rotate(-90,55,265)">Service</text>

  <text x="100" y="234" fill="#5f3e00" font-size="14" font-weight="bold">业务逻辑层</text>

  <rect x="100" y="245" width="300" height="48" rx="6" fill="#fef7e0" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="250" y="267" text-anchor="middle" fill="#5f3e00" font-size="13" font-weight="bold">RollCallService</text>
  <text x="250" y="283" text-anchor="middle" fill="#8d6e00" font-size="11">加权随机算法 · 点名状态 · 救场机制</text>

  <rect x="430" y="245" width="300" height="48" rx="6" fill="#fef7e0" stroke="#ffd54f" stroke-width="1.5"/>
  <rect x="430" y="245" width="6" height="48" rx="3" fill="#ff6b6b"/>
  <text x="580" y="267" text-anchor="middle" fill="#5f3e00" font-size="13" font-weight="bold">StatisticsService</text>
  <text x="580" y="283" text-anchor="middle" fill="#8d6e00" font-size="11">汇总统计 · 频次分布 · 排名计算</text>

  <!-- 箭头 -->
  <line x1="400" y1="313" x2="400" y2="338" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== Util 层 ==================== -->
  <rect x="30" y="343" width="740" height="60" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="343" width="50" height="60" fill="url(#utilGrad)" rx="10"/>
  <rect x="60" y="343" width="20" height="60" fill="url(#utilGrad)"/>
  <text x="55" y="378" text-anchor="middle" fill="#8b1a10" font-size="14" font-weight="bold" transform="rotate(-90,55,378)">Util</text>

  <text x="100" y="368" fill="#8b1a10" font-size="14" font-weight="bold">工具层</text>

  <rect x="100" y="377" width="300" height="16" rx="8" fill="#fce8e6" stroke="#ef9a9a" stroke-width="1"/>
  <text x="250" y="389" text-anchor="middle" fill="#8b1a10" font-size="11">WeightedRandom 加权随机算法</text>

  <rect x="430" y="377" width="300" height="16" rx="8" fill="#fce8e6" stroke="#ef9a9a" stroke-width="1"/>
  <text x="580" y="389" text-anchor="middle" fill="#8b1a10" font-size="11">ExcelUtil Apache POI 读写</text>

  <!-- 箭头 -->
  <line x1="400" y1="403" x2="400" y2="428" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== DAO 层 ==================== -->
  <rect x="30" y="433" width="740" height="60" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="433" width="50" height="60" fill="url(#daoGrad)" rx="10"/>
  <rect x="60" y="433" width="20" height="60" fill="url(#daoGrad)"/>
  <text x="55" y="468" text-anchor="middle" fill="#1e4620" font-size="14" font-weight="bold" transform="rotate(-90,55,468)">DAO</text>

  <text x="100" y="458" fill="#1e4620" font-size="14" font-weight="bold">数据访问层</text>

  <rect x="100" y="467" width="640" height="16" rx="8" fill="#e6f4ea" stroke="#a5d6a7" stroke-width="1"/>
  <text x="420" y="479" text-anchor="middle" fill="#1e4620" font-size="11">StudentDAO — Java 对象序列化 (ObjectOutputStream / ObjectInputStream)</text>

  <!-- 箭头 -->
  <line x1="400" y1="493" x2="400" y2="518" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== Model 层 ==================== -->
  <rect x="30" y="523" width="740" height="60" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="523" width="50" height="60" fill="url(#modelGrad)" rx="10"/>
  <rect x="60" y="523" width="20" height="60" fill="url(#modelGrad)"/>
  <text x="55" y="558" text-anchor="middle" fill="#3e1763" font-size="14" font-weight="bold" transform="rotate(-90,55,558)">Model</text>

  <text x="100" y="548" fill="#3e1763" font-size="14" font-weight="bold">数据模型层</text>

  <rect x="100" y="557" width="300" height="16" rx="8" fill="#f3e8fd" stroke="#ce93d8" stroke-width="1"/>
  <rect x="100" y="557" width="6" height="16" rx="3" fill="#ff6b6b"/>
  <text x="250" y="569" text-anchor="middle" fill="#3e1763" font-size="11">Student 学生实体</text>

  <rect x="430" y="557" width="300" height="16" rx="8" fill="#f3e8fd" stroke="#ce93d8" stroke-width="1"/>
  <rect x="430" y="557" width="6" height="16" rx="3" fill="#ff6b6b"/>
  <text x="580" y="569" text-anchor="middle" fill="#3e1763" font-size="11">RollCallRecord 点名记录</text>

  <!-- 箭头 -->
  <line x1="400" y1="583" x2="400" y2="608" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== 存储层 ==================== -->
  <rect x="30" y="613" width="740" height="52" rx="10" fill="#fff" filter="url(#shadowLayer)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="613" width="50" height="52" fill="url(#storeGrad)" rx="10"/>
  <rect x="60" y="613" width="20" height="52" fill="url(#storeGrad)"/>
  <text x="55" y="644" text-anchor="middle" fill="#37474f" font-size="14" font-weight="bold" transform="rotate(-90,55,644)">Store</text>

  <text x="100" y="635" fill="#37474f" font-size="14" font-weight="bold">文件存储</text>

  <rect x="180" y="637" width="130" height="18" rx="9" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <text x="245" y="650" text-anchor="middle" fill="#37474f" font-size="11">students.dat</text>

  <rect x="340" y="637" width="130" height="18" rx="9" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <text x="405" y="650" text-anchor="middle" fill="#37474f" font-size="11">records.dat</text>

  <!-- 图例 -->
  <rect x="530" y="625" width="8" height="8" rx="2" fill="#ff6b6b"/>
  <text x="543" y="634" fill="#666" font-size="10">我负责的模块</text>
</svg>
